<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>鲜花商详 · 信任背书交互 Demo</title>
    <link rel="stylesheet" href="../shared/pdp-demo-hotspot.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="trust-phone" data-trust-phone style="width:260px" data-trust-version="11">
      <!-- 商详主屏 -->
      <section class="trust-view trust-view--pdp trust-view--active" data-trust-view="pdp" aria-label="商品详情页">
        <div class="trust-stage" data-trust-stage>
          <img
            class="trust-screen"
            src="../../images/projects/pdp-p2-trust-pdp.png?v=4"
            alt="改版后商详 · 信任背书"
            width="260"
            height="564"
            decoding="sync"
            fetchpriority="high"
            draggable="false"
          />
          <button
            type="button"
            class="pdp-demo-hotspot pdp-demo-hotspot--ring-right trust-hotspot trust-hotspot--merchant"
            data-trust-goto="store"
            aria-label="进入商家店铺"
          ></button>
          <button
            type="button"
            class="pdp-demo-hotspot pdp-demo-hotspot--ring-right trust-hotspot trust-hotspot--reviews pdp-demo-hotspot--ring-compact"
            data-trust-goto="reviews"
            aria-label="进入商品评价"
          ></button>
          <button
            type="button"
            class="pdp-demo-hotspot pdp-demo-hotspot--ring-right trust-hotspot trust-hotspot--gallery pdp-demo-hotspot--ring-compact"
            data-trust-goto="gallery"
            aria-label="进入商家实拍返图"
          ></button>
        </div>
      </section>

      <!-- 商家店铺 -->
      <section class="trust-view trust-view--sub" data-trust-view="store" aria-label="商家店铺页" aria-hidden="true">
        <div class="trust-stage">
          <img
            class="trust-screen"
            src="../../images/projects/pdp-p2-trust-store.png"
            alt="商家店铺页"
            width="260"
            height="564"
            decoding="sync"
            draggable="false"
          />
          <button type="button" class="pdp-demo-hotspot pdp-demo-hotspot--no-ring trust-hotspot trust-hotspot--back" data-trust-back aria-label="返回商详"></button>
        </div>
      </section>

      <!-- 商品评价 -->
      <section class="trust-view trust-view--sub" data-trust-view="reviews" aria-label="商品评价页" aria-hidden="true">
        <div class="trust-stage">
          <img
            class="trust-screen"
            src="../../images/projects/pdp-p2-trust-reviews.png"
            alt="商品评价页"
            width="260"
            height="564"
            decoding="sync"
            draggable="false"
          />
          <button type="button" class="pdp-demo-hotspot pdp-demo-hotspot--no-ring trust-hotspot trust-hotspot--back" data-trust-back aria-label="返回商详"></button>
        </div>
      </section>

      <!-- 商家实拍返图 -->
      <section class="trust-view trust-view--sub" data-trust-view="gallery" aria-label="商家实拍返图" aria-hidden="true">
        <div class="trust-stage">
          <img
            class="trust-screen"
            src="../../images/projects/pdp-p2-trust-gallery.png"
            alt="商家实拍返图"
            width="260"
            height="564"
            decoding="sync"
            draggable="false"
          />
          <button type="button" class="pdp-demo-hotspot pdp-demo-hotspot--no-ring trust-hotspot trust-hotspot--back" data-trust-back aria-label="返回商详"></button>
        </div>
      </section>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
